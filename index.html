<script>

let scoreP = 0;
let scoreC = 0;

function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function maybe(prob){
    return Math.random() < prob;
}

function aiMove(){

    const modifiers = [
        "hypnotizing",
        "cursed",
        "flaming",
        "infinite",
        "giant",
        "tiny"
    ];

    const objects = [
        "rock",
        "duck",
        "pancake",
        "sword",
        "black hole",
        "universe",
        "reality"
    ];

    const effects = [
        "summon",
        "rewrite",
        "explode",
        "freeze",
        "storm",
        "loop"
    ];

    let parts = [];

    // 50% chance to use a modifier
    if(maybe(0.5)){
        parts.push(pick(modifiers));
    }

    // always pick object
    parts.push(pick(objects));

    // 60% chance for effect
    if(maybe(0.6)){
        parts.push(pick(effects));
    }

    return parts.join(" ");
}

function scoreMove(input){

    const base = {
        rock: 3,
        sword: 4,
        duck: 2,
        pancake: 5,
        "black hole": 6,
        universe: 10,
        reality: 10
    };

    const modifiers = {
        hypnotizing: 1.6,
        cursed: 1.5,
        flaming: 1.4,
        giant: 1.7,
        tiny: 0.8,
        infinite: 2.0
    };

    const effects = {
        summon: 1.7,
        rewrite: 2.5,
        explode: 1.8,
        freeze: 1.5,
        storm: 1.6,
        loop: 1.4
    };

    let words = input.toLowerCase().split(" ");

    let baseScore = 0;
    let mod = 1;
    let eff = 1;

    for(let w of words){

        if(base[w]) baseScore += base[w];

        if(modifiers[w]) mod *= modifiers[w];

        if(effects[w]) eff *= effects[w];
    }

    let unknowns = words.filter(w =>
        !base[w] && !modifiers[w] && !effects[w]
    ).length;

    baseScore += unknowns * 1.5;

    return baseScore * mod * eff;
}

function play(){

    let p = document.getElementById("player").value || "nothing";
    let c = aiMove();

    let ps = scoreMove(p);
    let cs = scoreMove(c);

    let result = "";

    if(ps > cs){
        result = "Jiyaandore won les goooooooooooo Thobs cookies haribo flavour!!!!!.";
        scoreP++;
    } else if(cs > ps){
        result = "AI wins sashj.";
        scoreC++;
    } else {
        result = "Bob won. But because you no Bob you go to backrooms.";
    }

    document.getElementById("log").innerText =
`You: ${p} (${ps.toFixed(2)})
AI: ${c} (${cs.toFixed(2)})

Result: ${result}

Score:
You ${scoreP} - ${scoreC} AI`;
}

</script>
