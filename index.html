<!DOCTYPE html>
<html>
<head>
<title>Chaos Combo Engine RPS</title>

<style>
body { 
    font-family: Arial; 
    background:#111; 
    color:#eee; 
    text-align:center; 
    padding:40px;
    overflow:hidden;
}

input, button { 
    padding:10px; 
    font-size:16px; 
    margin:10px;
}

#log { 
    margin-top:20px; 
    white-space:pre-wrap; 
}

/* ✨ floating combo visuals */
.combo {
    position: absolute;
    font-size: 22px;
    font-weight: bold;
    color: #00ffcc;
    pointer-events: none;
    animation: floatFade 1.2s ease-out forwards;
}

@keyframes floatFade {
    0% {
        opacity: 1;
        transform: translateY(0px) scale(1);
    }
    100% {
        opacity: 0;
        transform: translateY(-80px) scale(1.3);
    }
}
</style>
</head>

<body>

<h1>Chaos Combo Engine RPS</h1>

<input id="player" placeholder="your move...">
<br>
<button onclick="play()">Play</button>

<div id="log"></div>

<script>

let scoreP = 0;
let scoreC = 0;

function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function maybe(prob){
    return Math.random() < prob;
}

function showCombo(text){
    let el = document.createElement("div");
    el.className = "combo";
    el.innerText = text;

    el.style.left = (window.innerWidth / 2 + (Math.random()*120 - 60)) + "px";
    el.style.top = (window.innerHeight / 2 + (Math.random()*80 - 40)) + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 1200);
}

function aiMove(){

    const modifiers = ["hypnotizing","cursed","flaming","infinite","giant","tiny"];
    const objects = ["rock","duck","pancake","sword","black hole","universe","reality"];
    const effects = ["summon","rewrite","explode","freeze","storm","loop","spaghettification"];

    let parts = [];

    if(maybe(0.5)) parts.push(pick(modifiers));
    parts.push(pick(objects));
    if(maybe(0.6)) parts.push(pick(effects));

    return parts.join(" ");
}

function scoreMove(input){

    const base = {
        rock:3, sword:4, duck:2, pancake:5,
        "black hole":60, universe:10, reality:10,
        tv:0
    };

    const modifiers = {
        hypnotizing:1.6, cursed:1.5, flaming:1.4,
        giant:1.7, tiny:0.8, infinite:2.0 duckly: 5.3
    };

    const effects = {
        summon:1.7, rewrite:2.5, explode:1.8,
        freeze:1.5, storm:1.6, loop:1.4,
        spaghettification:1.2346712e9 quasarianed: 57.85
    Blessed : 2.5
    };

    let words = input.toLowerCase().split(" ");

    let baseScore = 0;
    let mod = 1;
    let eff = 1;

    for(let w of words){
        if(base[w]) baseScore += base[w];
        if(modifiers[w]) mod *= modifiers[w];
        if(effects[w]) eff *= effects[w];
    }

    baseScore += words.length * 0.5;

    let finalScore = baseScore * mod * eff;

    // ✨ VISUAL MULTIPLIERS
    if (mod > 1.2) {
        showCombo("x" + mod.toFixed(2));
    }

    if (eff > 2) {
        showCombo("⚡ x" + eff.toFixed(2));
    }

    return finalScore;
}


// ⭐ EASTER EGGS
function checkEasterEggs(input){

    let text = input.toLowerCase();

    if (text === "deltarune") {
        return {
            score: 215215,
            message: "✨ You did Susie's idea"
        };
    }

    if (text === "undertale") {
        return {
            score: 99999999,
            message: "ba ba ba papap ba ba do do does 99999999 damage"
        };
    }

    if (text.includes("hollow knight")) {
        return {
            score: 125,
            message: "My soul has been eaten by this soulless midget- 125 damage"
        };
    }

    return null;
}

function play(){

    let p = document.getElementById("player").value || "nothing";
    let c = aiMove();

    let ps = scoreMove(p);
    let cs = scoreMove(c);

    let result = "";

    let egg = checkEasterEggs(p);

    // 📺 TV MECHANIC
    let words = p.toLowerCase().split(" ");
    let hasTV = words.includes("tv");

    if (hasTV) {
        let steal = cs * 0.45;
        cs = cs * 0.55;
        ps += steal;

        showCombo("📺 TV STEAL +45%");
    }
        // 📺 BOMB MECHANIC
    let words = p.toLowerCase().split(" ");
    let hasTV = words.includes("bomb");

    if (hasTV) {
        let steal = cs * 0.90;
        cs = cs * 0.10;
        ps += steal;

        showCombo("Kaboom  STEAL +90%");
    }
        // 📺 POISON MECHANIC
    let words = p.toLowerCase().split(" ");
    let hasTV = words.includes("poisoned");

    if (hasTV) {
        let steal = cs * 0.35;
        cs = cs * 0.2;
        ps += steal;

        showCombo("The green trials");
    }

    if (egg) {
        ps = egg.score;
        result = egg.message;
    }
    else if (ps > cs) {
        result = "Jeff the player won. Ultimate Aura. Oh btw Wilbur and Maiaaaa.";
        scoreP++;
    }
    else if (cs > ps) {
        result = "AI wins you seeeeeeeling. Bro, du er så dårlig til det her med en AI, der skal vælge mellem et bestemt sæt ord, at du slår. Arbejder du i hemmelighed for et kunstig intelligens-firma, der prøver at øge moralen i en chatrobots oplevelse ved at lade dem vinde?";
        scoreC++;
    }
    else {
        result = "Bob won. Oh wait you are not bob Jeg sender dig ud i baglokalerne for at udgive dig for at være Bob..";
    }

    document.getElementById("log").innerText =
`You: ${p} (${ps.toFixed(2)})
AI: ${c} (${cs.toFixed(2)})

Result: ${result}

Score:
You ${scoreP} - ${scoreC} AI`;
}

</script>

</body>
</html>
