<!DOCTYPE html>
<html>
<head>
<title>Chaos Combo Engine RPS</title>
<style>
body { font-family: Arial; background:#111; color:#eee; text-align:center; padding:40px; }
input, button { padding:10px; font-size:16px; margin:10px; }
#log { margin-top:20px; white-space:pre-wrap; }
</style>
</head>
<body>

<h1>Chaos Combo Engine RPS</h1>

<input id="player" placeholder="your move...">
<br>
<button onclick="play()">Play</button>

<div id="log"></div>

<script>

let scoreP = 0;
let scoreC = 0;

function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function maybe(prob){
    return Math.random() < prob;
}

function aiMove(){

    const modifiers = ["hypnotizing","cursed","flaming","infinite","giant","tiny"];
    const objects = ["rock","duck","pancake","sword","black hole","universe","reality"];
    const effects = ["summon","rewrite","explode","freeze","storm","loop"];

    let parts = [];

    if(maybe(0.5)) parts.push(pick(modifiers));
    parts.push(pick(objects));
    if(maybe(0.6)) parts.push(pick(effects));

    return parts.join(" ");
}

function scoreMove(input){
    const base = {
        rock:3, sword:4, duck:2, pancake:5,
        "black hole":6, universe:10, reality:10
    };

    const modifiers = {
        hypnotizing:1.6, cursed:1.5, flaming:1.4,
        giant:1.7, tiny:0.8, infinite:2.0
    };

    const effects = {
        summon:1.7, rewrite:2.5, explode:1.8,
        freeze:1.5, storm:1.6, loop:1.4
    };

    let words = input.toLowerCase().split(" ");

    let baseScore = 0;
    let mod = 1;
    let eff = 1;

    for(let w of words){
        if(base[w]) baseScore += base[w];
        if(modifiers[w]) mod *= modifiers[w];
        if(effects[w]) eff *= effects[w];
    }

    baseScore += words.length * 0.5;

    return baseScore * mod * eff;
}

function play(){

    let p = document.getElementById("player").value || "nothing";
    let c = aiMove();

    let ps = scoreMove(p);
    let cs = scoreMove(c);

    let result = "";

    if(ps > cs){
        result = "You win this reality duel.";
        scoreP++;
    } else if(cs > ps){
        result = "AI bends reality harder.";
        scoreC++;
    } else {
        result = "Paradox stalemate.";
    }

    document.getElementById("log").innerText =
`You: ${p} (${ps.toFixed(2)})
AI: ${c} (${cs.toFixed(2)})

Result: ${result}

Score:
You ${scoreP} - ${scoreC} AI`;
}

</script>

</body>
</html>
